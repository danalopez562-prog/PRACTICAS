<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página Principal</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            background: linear-gradient(to right, #e3f2fd, #ffffff);
            font-family: Arial, sans-serif;
        }

        h1 {
            color: #333;
            font-weight: bold;
        }

        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-8px);
        }

        .card-title {
            font-weight: bold;
            color: #222;
        }

        .card-text {
            color: #666;
        }

        .btn {
            border-radius: 25px;
            padding: 8px 20px;
        }

        .container {
            margin-top: 60px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1 class="text-center mb-5">Página Principal</h1>

    <div class="row g-4">
        <!-- Tarjeta 1 -->
        <div class="col-md-4">
            <div class="card p-3">
                <div class="card-body text-center">
                    <h4 class="card-title">Tarjeta 1</h4>
                    <p class="card-text">Ir a la página 1</p>
                    <a href="cv_perfil.html" class="btn btn-primary">Entrar</a>
                </div>
            </div>
        </div>

        <!-- Tarjeta 2 -->
        <div class="col-md-4">

                    <h4 class="card-title">Tarjeta 2</h4>
                    <p class="card-text">Ir a la página 2</p>
                    <a href="tarjeta.html" class="btn btn-success">Entrar</a>
                </div>
            </div>
        </div>

        <!-- Tarjeta 3 -->
        <div class="col-md-4">
            <div class="card p-3">
                <div class="card-body text-center">
                    <h4 class="card-title">Tarjeta 3</h4>
                    <p class="card-text">Ir a la página 3</p>
                    <a href="tabla.html" class="btn btn-danger">Entrar</a>
                </div>
            </div>
        </div>
    </div>
</div>

</html>
